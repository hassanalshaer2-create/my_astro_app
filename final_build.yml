name: Final Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          # 1. حل مشكلة أمان Git (بناءً على مسار الخطأ السابق)
          git config --global --add safe.directory /root/flutter/3.41.4
          
          # 2. تثبيت أداة Flet للبناء
          pip install flet
          
          # 3. إنشاء ملف المتطلبات (ضروري جداً ليعمل التطبيق بعد التثبيت)
          echo "flet" > requirements.txt
          echo "ephem" >> requirements.txt
          
          # 4. أمر البناء - سيقوم بدمج ephem تلقائياً داخل الـ APK
          flet build apk --module-name main_android --yes --skip-flutter-doctor

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: build/apk/*.apk
