name: Final Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          git config --global --add safe.directory '*'
          pip install flet
          
          # إنشاء ملف متطلبات نظيف وبإصدارات متوافقة مع أندرويد
          # تم حذف flet من هنا لأن الأداة تثبته تلقائياً وتكراره يسبب فشل البناء
          echo "skyfield==1.46" > requirements.txt
          echo "geopy" >> requirements.txt
          echo "hijri-converter" >> requirements.txt
          echo "arabic-reshaper" >> requirements.txt
          echo "python-bidi" >> requirements.txt
          echo "python-docx" >> requirements.txt
          
          # بناء التطبيق مع تحديد اسم الملف الصحيح
          flet build apk --module-name almequate_android --yes --skip-flutter-doctor
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: build/apk/*.apk
