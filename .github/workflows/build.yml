name: Final Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          git config --global --add safe.directory '*'
          pip install flet
          
          # إنشاء المتطلبات
          echo "flet" > requirements.txt
          echo "skyfield" >> requirements.txt
          echo "geopy" >> requirements.txt
          echo "hijri-converter" >> requirements.txt
          echo "arabic-reshaper" >> requirements.txt
          echo "python-bidi" >> requirements.txt
          echo "python-docx" >> requirements.txt
          
          # تعديل هام: --module-name يجب أن يكون almequate_android
          flet build apk --module-name almequate_android --yes --skip-flutter-doctor

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: build/apk/*.apk
