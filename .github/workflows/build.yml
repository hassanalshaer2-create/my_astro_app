name: Final Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          git config --global --add safe.directory '*'
          pip install flet
          
          # 1. إنشاء ملف المتطلبات بأبسط صورة ممكنة
          echo "skyfield==1.42" > requirements.txt
          echo "jplephem==2.17" >> requirements.txt
          echo "arabic-reshaper" >> requirements.txt
          echo "python-bidi" >> requirements.txt
          echo "geopy" >> requirements.txt
          echo "hijri-converter" >> requirements.txt
          echo "python-docx" >> requirements.txt

          # 2. أمر البناء السحري:
          # نستخدم --pre لضمان جلب النسخ المهيأة مسبقاً للأندرويد
          flet build apk --module-name almequate_android --yes --skip-flutter-doctor
