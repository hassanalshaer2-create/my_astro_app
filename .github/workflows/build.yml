name: Final Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK
        run: |
          # 1. حل مشكلة ملكية المجلد في جيت
          git config --global --add safe.directory '*'
          
          # 2. تثبيت أداة Flet
          pip install flet
          
          # 3. إنشاء ملف المتطلبات (بدون flet لتجنب التعارض وبدون المكتبات التي تسبب أخطاء)
          # ملاحظة: تم استخدام hijri-converter بدلاً من ummalqura لضمان النجاح
          echo "skyfield" > requirements.txt
          echo "geopy" >> requirements.txt
          echo "hijri-converter" >> requirements.txt
          echo "arabic-reshaper" >> requirements.txt
          echo "python-bidi" >> requirements.txt
          echo "python-docx" >> requirements.txt
          
          # 4. بناء الـ APK مع توجيه صريح لملف المتطلبات
          flet build apk --module-name main_android --yes --skip-flutter-doctor --requirements requirements.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-final-apk
          path: build/apk/*.apk
